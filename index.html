    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) { window.lucide.createIcons(); } }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Accessibility Menu Component ---
        const AccessibilityMenu = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [settings, setSettings] = useState({ grayscale: false, contrast: false, links: false, readableFont: false, fontSize: 100 });
            
            const toggleSetting = (key) => setSettings(prev => ({ ...prev, [key]: !prev[key] }));
            const changeFontSize = (delta) => setSettings(prev => ({ ...prev, fontSize: Math.max(100, Math.min(150, prev.fontSize + delta)) }));
            const reset = () => setSettings({ grayscale: false, contrast: false, links: false, readableFont: false, fontSize: 100 });
            
            useEffect(() => {
                const body = document.body;
                body.classList.toggle('accessible-grayscale', settings.grayscale);
                body.classList.toggle('accessible-contrast', settings.contrast);
                body.classList.toggle('accessible-links', settings.links);
                body.classList.toggle('accessible-font', settings.readableFont);
                body.style.fontSize = `${settings.fontSize}%`;
            }, [settings]);

            return (
                <div className="fixed bottom-6 left-6 z-[9999]">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-14 h-14 bg-telem-dark text-white rounded-full shadow-2xl flex items-center justify-center hover:bg-telem-forest transition-all border-2 border-white" title="תפריט נגישות">
                        <Icon name="accessibility" size={30} />
                    </button>
                    {isOpen && (
                        <div className="absolute bottom-16 left-0 w-72 bg-white rounded-2xl shadow-2xl border border-gray-200 p-6 animate-fade-in text-right text-telem-black">

                            <div className="space-y-3 text-sm">
                                <button onClick={() => toggleSetting('contrast')} className={`w-full text-right p-3 rounded-xl transition-all flex items-center justify-between border ${settings.contrast ? 'bg-telem-dark text-white' : 'hover:bg-gray-50'}`}>
                                    <span>ניגודיות גבוהה</span><Icon name="contrast" size={18} />
                                </button>
                                <button onClick={() => toggleSetting('grayscale')} className={`w-full text-right p-3 rounded-xl transition-all flex items-center justify-between border ${settings.grayscale ? 'bg-telem-dark text-white' : 'hover:bg-gray-50'}`}>
                                    <span>גווני אפור</span><Icon name="image" size={18} />
                                </button>
                                <button onClick={() => toggleSetting('links')} className={`w-full text-right p-3 rounded-xl transition-all flex items-center justify-between border ${settings.links ? 'bg-telem-dark text-white' : 'hover:bg-gray-50'}`}>
                                    <span>הדגשת קישורים</span><Icon name="external-link" size={18} />
                                </button>
                                <button onClick={() => toggleSetting('readableFont')} className={`w-full text-right p-3 rounded-xl transition-all flex items-center justify-between border ${settings.readableFont ? 'bg-telem-dark text-white' : 'hover:bg-gray-50'}`}>
                                    <span>גופן קריא</span><Icon name="type" size={18} />
                                </button>
                                <div className="flex gap-2">
                                    <button onClick={() => changeFontSize(10)} className="flex-1 bg-gray-100 p-2 rounded-lg font-bold hover:bg-gray-200">A+</button>
                                    <button onClick={() => changeFontSize(-10)} className="flex-1 bg-gray-100 p-2 rounded-lg font-bold hover:bg-gray-200">A-</button>
                                </div>
                                <button onClick={reset} className="w-full text-center p-2 text-sm text-red-600 font-bold hover:underline mt-2">ביטול כל ההתאמות</button>
                            </div>
                        </div>
                    )}
                </div>

        };
