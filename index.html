<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="1oB6JUju7uiK0NjqkGydkSNIR24SxMbsUqNgwrONlvM" />
    <title>תלם | נספח אצירת אשפה וייעוץ סביבתי - המומחים למגזר הציבורי והכפרי</title>
    <meta name="description" content="תלם ניהול סביבה בהנהלת אבירם בוצר: מומחיות בנספח אצירת אשפה, נספחים סביבתיים וסקרים היסטוריים. ניסיון בניהול ביצוע ותשתיות מורכבות כגון הרכבת הקלה." />
    <link rel="canonical" href="https://telemenv.co.il/" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        telem: {
                            moss: '#78836a',
                            forest: '#475d4b',
                            dark: '#243e38',
                            black: '#1d1d1b',
                            cream: '#f8f4f1',
                            khaki: '#94937f'
                        }
                    },
                    fontFamily: {
                        sans: ['"Google Sans"', 'Assistant', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500;600;700;800&display=swap');
        body { font-family: "Google Sans", "Assistant", sans-serif; background-color: #f8f4f1; color: #1d1d1b; overflow-x: hidden; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        html { scroll-behavior: smooth; }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            z-index: 10000;
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) { window.lucide.createIcons(); } }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Navigation = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const PHONE_NUMBER = "0506890650";
            const LINKEDIN_URL = "https://www.linkedin.com/in/aviram-botzer-01782aa5/";
            
            const navItems = [
                { name: 'דף הבית', href: '/' }, 
                { name: 'ניהול סביבה', href: '/environmental-management/' },
                { name: 'נספח אצירת אשפה', href: '/waste/' }, 
                { name: 'מרכז ידע', href: '/guides/' },
                { name: 'סולארי ואגירה', href: '/solar/' },
                { name: 'נספח סביבתי', href: '/env/' }, 
                { name: 'סקר היסטורי', href: '/history/' }
            ];

            return (
                <header className="fixed top-0 w-full bg-white/95 backdrop-blur-sm shadow-sm z-[100] border-b border-telem-khaki/10 h-24 flex items-center">
                    <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center flex-row-reverse">
                        {/* Logo on the Right */}
                        <a href="/" className="flex items-center">
                            <img src="/logo.png" alt="תלם" className="h-16 md:h-20 w-auto" />
                        </a>

                        {/* Desktop Menu in Center */}
                        <nav className="hidden xl:flex gap-6 items-center flex-row-reverse">
                            {navItems.map(item => (
                                <a key={item.name} href={item.href} className="text-[15px] font-bold text-telem-forest hover:text-telem-moss transition-colors italic uppercase tracking-tighter">
                                    {item.name}
                                </a>
                            ))}
                        </nav>

                        {/* Contact on the Left */}
                        <div className="hidden md:flex items-center gap-4 flex-row-reverse">
                            <a href={LINKEDIN_URL} target="_blank" className="text-telem-dark hover:text-telem-moss transition-colors">
                                <Icon name="linkedin" size={24} />
                            </a>
                            <a href={`tel:${PHONE_NUMBER}`} className="bg-telem-dark text-white px-6 py-2.5 rounded-xl font-bold font-sans flex items-center gap-2 hover:bg-telem-forest transition-all shadow-md">
                                <Icon name="phone" size={18} />
                                <span>050-6890650</span>
                            </a>
                        </div>

                        {/* Mobile Toggle */}
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="xl:hidden text-telem-dark p-2">
                            <Icon name={isMenuOpen ? "x" : "menu"} size={32} />
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed top-24 w-full bg-white z-[90] shadow-2xl xl:hidden animate-fade-in text-right p-6 border-b-4 border-telem-khaki">
                            <div className="flex flex-col gap-5">
                                {navItems.map(item => (
                                    <a key={item.name} href={item.href} className="text-xl font-black text-telem-forest py-2 border-b border-gray-50 italic">
                                        {item.name}
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}
                </header>
            );
        };

        const App = () => {
            const WA_NUMBER = "972506890650";
            return (
                <div className="min-h-screen">
                    <Navigation />
                    
                    <a href={`https://wa.me/${WA_NUMBER}`} className="whatsapp-float" target="_blank">
                        <Icon name="message-circle" size={32} />
                    </a>

                    <main className="pt-48 animate-fade-in">
                        {/* Hero Section */}
                        <section className="pb-24 bg-telem-moss/5 relative">
                            <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-16 items-center text-right">
                                <div className="lg:col-span-12 text-center md:text-right">
                                    <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-telem-dark text-white rounded-full text-sm font-bold mb-8 italic tracking-tighter uppercase">מומחיות במגזר הציבורי, הכפרי והתשתיות</div>
                                    <h1 className="text-5xl md:text-8xl font-black text-telem-black mb-8 leading-[1] italic tracking-tighter uppercase">מקצרים לכם את הדרך ל<span className="text-telem-forest italic underline decoration-telem-khaki decoration-8">אישור סביבתי</span></h1>
                                    <p className="text-xl md:text-3xl text-telem-forest font-semibold mb-12 max-w-4xl leading-relaxed italic">
                                        ליווי מקצועי הכולל ניהול ביצוע בתהליכי בנייה ותשתיות מורכבות. מומחיות ייחודית בנספחי אצירת אשפה וסביבה מתוך הבנה עמוקה של שיקולי הרשות המאשרת.
                                    </p>
                                    <button onClick={() => window.open(`https://wa.me/${WA_NUMBER}`, '_blank')} className="bg-telem-forest text-white px-12 py-5 rounded-2xl font-black text-2xl hover:bg-telem-dark shadow-2xl transition-all italic tracking-tight uppercase">התייעצות מקצועית מהירה</button>
                                </div>
                            </div>
                        </section>
                        
                        {/* Placeholder for other sections to keep index short here */}
                        <section className="py-20 text-center text-gray-400 italic font-bold">
                            שאר תוכן דף הבית (שירותים, מרכז ידע) מופיע כאן...
                        </section>
                    </main>

                    <footer className="bg-telem-dark text-white py-20 px-4 text-right border-t border-telem-forest/30 font-serif italic">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div>
                                <div className="text-telem-khaki font-black text-3xl mb-2 italic tracking-tighter uppercase">תלם | ניהול סביבה</div>
                                <p className="text-telem-cream/40 text-lg">אבירם בוצר - ניסיון מהצד של הרשות לקידום הפרויקט שלכם.</p>
                            </div>
                            <p className="text-xs opacity-30 tracking-widest uppercase">© {new Date().getFullYear()} תלם - כל הזכויות שמורות.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
