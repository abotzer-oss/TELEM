<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="1oB6JUju7uiK0NjqkGydkSNIR24SxMbsUqNgwrONlvM" />
    <title>תלם | נספח אצירת אשפה וייעוץ סביבתי - המומחים למגזר הציבורי והכפרי</title>
    
    <!-- Google Ads Tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-123456789"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-123456789');

      window.reportConversion = function(label) {
        if (typeof gtag === 'function') {
          gtag('event', 'conversion', { 'send_to': 'AW-123456789/' + label });
        }
      };
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        telem: {
                            moss: '#78836a',
                            forest: '#475d4b',
                            dark: '#243e38',
                            black: '#1d1d1b',
                            cream: '#f8f4f1',
                            khaki: '#94937f'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: #f8f4f1;
            margin: 0;
            padding: 0;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // הגנה מפני קריסה של משתני סביבה
        const getSafeConfig = () => {
            try {
                if (typeof __firebase_config !== 'undefined') return JSON.parse(__firebase_config);
            } catch (e) {}
            return null;
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const PHONE = "050-6890650";

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="fixed top-0 w-full bg-white shadow-sm z-50 h-20 flex items-center px-4">
                        <div className="max-w-7xl mx-auto w-full flex justify-between items-center">
                            <div className="font-black text-2xl text-telem-dark">תלם</div>
                            
                            <nav className="hidden md:flex gap-8 font-bold text-telem-forest">
                                <a href="#" className="hover:text-telem-moss">דף הבית</a>
                                <a href="#services" className="hover:text-telem-moss">שירותים</a>
                                <a href="#about" className="hover:text-telem-moss">אודות</a>
                                <a href="tel:0506890650" className="text-telem-dark underline">{PHONE}</a>
                            </nav>

                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "x" : "menu"} />
                            </button>
                        </div>
                    </header>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed top-20 w-full bg-white z-40 border-b shadow-xl p-6 flex flex-col gap-4 text-right font-bold">
                            <a href="#" onClick={() => setIsMenuOpen(false)}>דף הבית</a>
                            <a href="#services" onClick={() => setIsMenuOpen(false)}>שירותים</a>
                            <a href="tel:0506890650">{PHONE}</a>
                        </div>
                    )}

                    {/* Hero */}
                    <section className="pt-40 pb-20 px-4">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-center text-right">
                            <div>
                                <h1 className="text-5xl md:text-7xl font-black text-telem-black mb-6 leading-tight">
                                    המומחים ל<span className="text-telem-forest">ניהול סביבה</span> ואצירת אשפה
                                </h1>
                                <p className="text-xl text-gray-600 mb-8 font-medium">
                                    ליווי מקצועי במגזר הציבורי, הכפרי והתשתיות. מביאים את הניסיון מהצד של הרשות לקידום הפרויקט שלכם.
                                </p>
                                <div className="flex flex-wrap gap-4 justify-end">
                                    <a href={`tel:${PHONE.replace(/-/g,'')}`} 
                                       onClick={() => window.reportConversion && window.reportConversion('phone_call')}
                                       className="bg-telem-dark text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-telem-forest transition-all">
                                        התקשרו עכשיו
                                    </a>
                                </div>
                            </div>
                            
                            <div className="bg-white p-8 rounded-3xl shadow-2xl border border-gray-100">
                                <h3 className="text-2xl font-bold mb-6 text-telem-dark">השאירו פרטים ונחזור אליכם</h3>
                                <form className="flex flex-col gap-4" onSubmit={(e) => e.preventDefault()}>
                                    <input type="text" placeholder="שם מלא" className="p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-telem-khaki transition-all text-right" />
                                    <input type="tel" placeholder="טלפון" className="p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-telem-khaki transition-all text-right" />
                                    <button 
                                        onClick={() => {
                                            if (window.reportConversion) window.reportConversion('form_submission');
                                            alert('תודה! נחזור אליך בהקדם.');
                                        }}
                                        className="bg-telem-forest text-white py-4 rounded-xl font-black text-xl hover:bg-telem-dark transition-all">
                                        שלח פנייה
                                    </button>
                                </form>
                            </div>
                        </div>
                    </section>

                    {/* Services */}
                    <section id="services" className="py-20 bg-white px-4">
                        <div className="max-w-7xl mx-auto text-right">
                            <h2 className="text-4xl font-black mb-12 text-telem-dark italic border-r-8 border-telem-khaki pr-4">השירותים שלנו</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[
                                    { title: "אצירת אשפה", icon: "trash-2", desc: "תכנון הנדסי של מערכי אצירה וחישוב נפחי פסולת להיתר בנייה." },
                                    { title: "ניהול סביבה", icon: "settings", desc: "ליווי וניהול ביצוע בפרויקטי בנייה ותשתיות לאומיות מורכבות." },
                                    { title: "סקר היסטורי", icon: "history", desc: "בדיקת שימושי עבר וזיהומי קרקע בבדיקת נאותות סביבתית." }
                                ].map((s, i) => (
                                    <div key={i} className="p-8 rounded-3xl border border-gray-100 hover:shadow-xl transition-all bg-telem-cream/20">
                                        <Icon name={s.icon} size={40} className="text-telem-forest mb-4" />
                                        <h3 className="text-2xl font-black mb-2">{s.title}</h3>
                                        <p className="text-gray-600 font-medium">{s.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="mt-auto bg-telem-black text-white py-12 px-4 text-center">
                        <div className="max-w-7xl mx-auto">
                            <p className="text-xl font-bold mb-2">תלם | ניהול סביבה ופסולת</p>
                            <p className="opacity-60">אבירם בוצר - 050-6890650</p>
                        </div>
                    </footer>

                    {/* WhatsApp */}
                    <a href="https://wa.me/972506890650" 
                       onClick={() => window.reportConversion && window.reportConversion('whatsapp_chat')}
                       className="whatsapp-float" target="_blank">
                        <Icon name="message-circle" size={32} />
                    </a>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
