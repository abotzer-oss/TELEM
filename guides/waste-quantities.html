<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חישוב כמויות פסולת בניין ועודפי עפר: המדריך המלא לפי הנחיות המשרד | תלם</title>
    <meta name="description" content="המדריך המקצועי לחישוב כמויות פסולת בניין ועודפי עפר בהתאם למדיניות המשרד להגנת הסביבה. גלו את טבלת המקדמים הרשמית ומנעו עיכובים בטופס 4." />
    <link rel="canonical" href="https://telemenv.co.il/guides/waste-quantities.html" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect } = React;

const Icon = ({ name, size = 20 }) => {
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
    return <i data-lucide={name} style={{ width: size, height: size }}></i>;
};

const App = () => {
    const WA_NUMBER = "972506890650";
    const PHONE_NUMBER = "0506890650";

    return (
        <main className="max-w-5xl mx-auto px-4 pt-16 text-right">

            <article className="bg-white p-10">

                {/* ✅ H1 מחוזק */}
                <h1 className="text-4xl md:text-6xl font-black mb-10">
                    חישוב כמויות פסולת בניין ועודפי עפר – מדריך מלא לפי הנחיות המשרד להגנת הסביבה
                </h1>

                {/* ✅ פסקה עם קישור פנימי */}
                <p>
                    הכנת <a href="/waste/">נספח אצירת אשפה</a> לחישוב כמויות פסולת בניין ועודפי עפר
                    אינה רק דרישה טכנית – אלא חלק קריטי בקבלת היתר בנייה ואישור טופס 4.
                </p>

                <h2>טבלת מקדמים</h2>
                <p>המקדמים מבוססים על הנחיות המשרד להגנת הסביבה.</p>

                <h2>עודפי עפר</h2>
                <p>עודפי עפר הם המרכיב הכלכלי המשמעותי ביותר בפרויקט.</p>

                {/* ✅ קישור נוסף באמצע */}
                <p>
                    למידע נוסף על דרישות רגולטוריות ראו גם
                    <a href="/env/"> נספח סביבתי להיתר</a>.
                </p>

                <h3>למה הניסיון חשוב</h3>
                <p>
                    ניסיון נכון מונע עיכובים ואי התאמות מול הרשויות.
                </p>

                {/* ✅ בלוק קישורים (הכי חשוב ל-SEO) */}
                <div style={{marginTop: "40px"}}>
                    <h3>לקריאה נוספת ושירותים משלימים</h3>

                    <ul>
                        <li><a href="/waste/">נספח אצירת אשפה</a></li>
                        <li><a href="/env/">נספח סביבתי להיתר</a></li>
                        <li><a href="/history/">סקר היסטורי</a></li>
                        <li><a href="/guides/waste-calculation.html">חישוב אצירת פסולת</a></li>
                    </ul>
                </div>

                {/* CTA נשאר */}
                <div style={{marginTop: "40px"}}>
                    <button onClick={() => window.open(`https://wa.me/${WA_NUMBER}`)}>
                        וואטסאפ
                    </button>

                    <a href={`tel:${PHONE_NUMBER}`}>התקשר</a>
                </div>

            </article>
        </main>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
