                const body = document.body;

                                <button onClick={() => toggleSetting('links')} className={`w-full text-right p-3 rounded-xl transition-all flex items-center justify-between border ${settings.links ? 'bg-telem-dark text-white' : 'hover:bg-gray-50'}`}><span>הדגשת קישורים</span><Icon name="external-link" size={18} /></button>

                            <section>

                                    <div className="bg-white p-6 rounded-2xl border border-telem-khaki/20 shadow">

                                        <p className="text-base">בניינים לאורך עורקי תנועה ראשיים נחשפים לרמות רעש העולות על 65 דציבל. הנספח הסביבתי מגדיר את ציפוי החזית הנדרש ומפרט את סוג החלונות האקוסטיים לכל חדר.</p>

                                    <div className="bg-white p-6 rounded-2xl border border-telem-khaki/20 shadow">

                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-telem-khaki/20 shadow">

                                </div>

                                    </li>
                                    <li className="flex items-start gap-3">

                                    </li>
                                </ul>

                        </div>
